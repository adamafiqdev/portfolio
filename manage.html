<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Manager — Adam Afiq</title>
  <meta name="robots" content="noindex, nofollow">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">

  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/manage.css?v=1">
</head>
<body>

<!-- ════════════════════════════════════════════════════════
     APP SHELL
════════════════════════════════════════════════════════ -->
<div class="manage-app">

  <!-- Header -->
  <header class="manage-header">
    <div class="manage-header-left">
      <a href="index.html" class="manage-logo">
        <div class="manage-logo-mark">A</div>
        Adam Afiq
      </a>
      <div class="manage-breadcrumb">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
        <span>Portfolio Manager</span>
      </div>
    </div>

    <div class="manage-header-right">
      <button class="btn btn-secondary btn-sm" id="importBtn" title="Import projects.json">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Import JSON
      </button>
      <button class="btn btn-success btn-sm" id="exportSiteBtn" title="Export site sections as site.json">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
        </svg>
        Export Site JSON
      </button>
      <button class="btn btn-success btn-sm" id="exportBtn" title="Export as projects.json">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export JSON
      </button>
      <button class="btn btn-secondary btn-sm" id="themeToggleManage" title="Toggle theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
        Theme
      </button>
      <a href="index.html" class="btn btn-secondary btn-sm" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/>
        </svg>
        View Portfolio
      </a>
    </div>
  </header>

  <!-- Body -->
  <div class="manage-body" id="manageBody">

    <!-- Section Nav (spans full width) -->
    <nav class="section-nav" id="sectionNav">
      <button class="snav-btn active" data-sec="projects">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Projects
      </button>
      <button class="snav-btn" data-sec="about">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        About Me
      </button>
      <button class="snav-btn" data-sec="services">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Services
      </button>
      <button class="snav-btn" data-sec="techstack">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>
        Tech Stack
      </button>
      <button class="snav-btn" data-sec="experience">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Experience
      </button>
      <button class="snav-btn" data-sec="contact">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        Contact
      </button>
    </nav>

    <!-- Sidebar (projects only) -->
    <aside class="manage-sidebar" id="manageSidebar">
      <div class="sidebar-top">
        <button class="btn btn-primary btn-full" id="addProjectBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Add Project
        </button>
        <div class="sidebar-search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input class="sidebar-search-input" id="sidebarSearch" type="text" placeholder="Search projects...">
        </div>
        <div class="project-count" id="projectCount">0 projects</div>
      </div>

      <div class="project-list" id="projectList">
        <!-- Populated by manage.js -->
      </div>

      <!-- Instructions Panel -->
      <div style="padding: 12px; border-top: 1px solid var(--border);">
        <div style="font-size: 11px; color: var(--text-muted); line-height: 1.7;">
          <strong style="color: var(--text-secondary); display: block; margin-bottom: 4px;">How to publish:</strong>
          1. Add/edit your projects here<br>
          2. Click <strong>Export JSON</strong><br>
          3. Place the file at <code style="font-size:10px">data/projects.json</code><br>
          4. Push all files to GitHub Pages
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="manage-content">
      <div id="managePanel">
        <!-- Populated by manage.js -->
      </div>
    </main>

  </div>
</div>

<!-- ════════════════════════════════════════════════════════
     CONFIRM DELETE DIALOG
════════════════════════════════════════════════════════ -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-dialog">
    <h3 class="confirm-title" id="confirmTitle">Delete Project?</h3>
    <p class="confirm-desc" id="confirmDesc">This action cannot be undone.</p>
    <div class="confirm-actions">
      <button class="btn btn-secondary" id="confirmCancel">Cancel</button>
      <button class="btn btn-danger" id="confirmOk">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
        </svg>
        Delete Project
      </button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════
     TOAST NOTIFICATIONS
════════════════════════════════════════════════════════ -->
<div class="toast-container" id="toastContainer"></div>

<!-- Script -->
<script src="assets/js/manage.js?v=1"></script>
</body>
</html>
